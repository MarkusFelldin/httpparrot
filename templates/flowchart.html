<!doctype html>
<html lang="en">
<head>
    <title>Which Status Code? - HTTP Parrots</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon"/>
    <style>
        .flow-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 2rem 1.5rem 3rem;
        }

        /* History trail */
        .flow-history {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .flow-past-node {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 10px;
            padding: 0.6rem 1rem;
            text-align: center;
            width: 100%;
            max-width: 420px;
            opacity: 0.5;
        }

        .flow-past-q {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.4);
        }

        .flow-past-answer {
            font-size: 0.75rem;
            font-weight: 600;
            color: #2dd4a8;
            margin-top: 0.15rem;
        }

        /* Connector line */
        .flow-connector {
            width: 2px;
            height: 24px;
            background: linear-gradient(180deg, rgba(255,255,255,0.1), rgba(255,255,255,0.04));
            margin: 0 auto;
        }

        /* Current question node */
        .flow-node {
            background: #1a1a1f;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 1.5rem;
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            animation: flow-fade-in 0.3s ease;
        }

        .flow-node h2 {
            font-size: 1.05rem;
            font-weight: 700;
            color: #ffffff;
            text-align: center;
            margin-bottom: 1.25rem;
            line-height: 1.4;
        }

        /* Diamond shape indicator */
        .flow-diamond {
            width: 10px;
            height: 10px;
            background: rgba(0,201,167,0.6);
            transform: rotate(45deg);
            margin: 0 auto 1rem;
            border-radius: 2px;
        }

        /* Yes/No buttons side by side */
        .flow-yesno {
            display: flex;
            gap: 0.75rem;
        }

        .flow-yesno .flow-btn {
            flex: 1;
            text-align: center;
            font-weight: 600;
        }

        .flow-yesno .flow-btn-yes {
            border-color: rgba(0,201,167,0.2);
            color: #2dd4a8;
        }

        .flow-yesno .flow-btn-yes:hover {
            background: rgba(0,201,167,0.08);
            border-color: rgba(0,201,167,0.4);
            box-shadow: 0 0 15px rgba(0,201,167,0.1);
        }

        .flow-yesno .flow-btn-no {
            border-color: rgba(233,69,96,0.2);
            color: #ff6b6b;
        }

        .flow-yesno .flow-btn-no:hover {
            background: rgba(233,69,96,0.08);
            border-color: rgba(233,69,96,0.4);
            box-shadow: 0 0 15px rgba(233,69,96,0.1);
        }

        /* Option buttons (vertical) */
        .flow-options {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .flow-btn {
            padding: 0.7rem 1rem;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.02);
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
            font-family: inherit;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
        }

        .flow-btn:hover {
            background: rgba(255,255,255,0.05);
            border-color: rgba(255,255,255,0.15);
            color: #fff;
            transform: translateY(-1px);
        }

        /* Result node */
        .flow-result {
            background: #1a1a1f;
            border-radius: 14px;
            overflow: hidden;
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            animation: flow-fade-in 0.3s ease;
        }

        .flow-result-image {
            background: #111114;
            text-align: center;
            padding: 1rem;
        }

        .flow-result-image img {
            max-width: 100%;
            height: 14em;
            object-fit: cover;
            border-radius: 8px;
        }

        .flow-result-body {
            padding: 1.25rem 1.5rem 1.5rem;
            text-align: center;
        }

        .flow-result-code {
            font-size: 3rem;
            font-weight: 800;
            line-height: 1;
        }

        .flow-result-name {
            font-size: 0.95rem;
            color: rgba(255,255,255,0.45);
            margin-top: 0.25rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            font-weight: 600;
        }

        .flow-result-why {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.6);
            line-height: 1.6;
            margin-top: 1rem;
            text-align: left;
        }

        .flow-result-border {
            height: 3px;
            border-radius: 2px;
        }

        .flow-actions {
            display: flex;
            gap: 0.6rem;
            justify-content: center;
            margin-top: 1.25rem;
        }

        .flow-actions .btn-back {
            font-size: 0.85rem;
            padding: 0.5rem 1.25rem;
        }

        /* Start over (shown at bottom when history exists) */
        .flow-restart {
            text-align: center;
            margin-top: 1.5rem;
        }

        .flow-restart button {
            background: none;
            border: none;
            color: rgba(255,255,255,0.3);
            font-size: 0.8rem;
            font-family: inherit;
            cursor: pointer;
            transition: color 0.2s;
        }

        .flow-restart button:hover {
            color: rgba(255,255,255,0.6);
        }

        @keyframes flow-fade-in {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <header class="site-header-compact" role="banner">
        <div class="header-inner">
            <div class="header-left">
                <a href="/" class="header-title">HTTP Parrots</a>
                <span class="header-subtitle">Which Status Code?</span>
                <nav class="header-nav" aria-label="Site navigation">
                    <a href="/quiz">Quiz</a>
                    <a href="/flowchart">Flowchart</a>
                    <a href="/tester">Tester</a>
                    <a href="/api-docs">API</a>
                </nav>
            </div>
        </div>
    </header>

    <main class="flow-container" role="main">
        <div id="flow"></div>
    </main>

    <footer class="site-footer">HTTP Parrots by Markus Felldin</footer>

    <script>
    (function() {
        var tree = {
            q: "Did the request succeed?",
            yes: {
                q: "Did you create a new resource?",
                yes: { result: "201", name: "Created", why: "The request succeeded and a new resource was created. Return a Location header pointing to it." },
                no: {
                    q: "Is there a response body?",
                    yes: {
                        q: "Is the response from the origin server?",
                        yes: { result: "200", name: "OK", why: "The standard success response. Return the requested data." },
                        no: { result: "203", name: "Non-Authoritative Information", why: "The response was modified by a proxy or intermediate. The data may differ from the origin." }
                    },
                    no: {
                        q: "Should the client reset its view (e.g. clear a form)?",
                        yes: { result: "205", name: "Reset Content", why: "Tells the client to reset the document view, like clearing a form after submission." },
                        no: { result: "204", name: "No Content", why: "Success, but nothing to return. Common for DELETE operations or saves." }
                    }
                }
            },
            no: {
                q: "Is the resource somewhere else?",
                yes: {
                    q: "Has it moved permanently?",
                    yes: {
                        q: "Should the HTTP method be preserved?",
                        yes: { result: "308", name: "Permanent Redirect", why: "The resource moved permanently and the client must use the same method (POST stays POST)." },
                        no: { result: "301", name: "Moved Permanently", why: "The resource moved permanently. Browsers may change POST to GET." }
                    },
                    no: {
                        q: "Is this a temporary redirect?",
                        yes: {
                            q: "Should the HTTP method be preserved?",
                            yes: { result: "307", name: "Temporary Redirect", why: "Temporary redirect that preserves the request method." },
                            no: { result: "302", name: "Found", why: "Temporary redirect. Browsers typically change POST to GET." }
                        },
                        no: { result: "303", name: "See Other", why: "Redirect to a different resource using GET. Classic Post/Redirect/Get pattern." }
                    }
                },
                no: {
                    q: "Is the problem with the client's request?",
                    yes: {
                        q: "What kind of client error?",
                        options: {
                            "Missing or bad authentication": {
                                q: "Does the client need to authenticate?",
                                yes: { result: "401", name: "Unauthorized", why: "The client needs to authenticate. Include a WWW-Authenticate header." },
                                no: { result: "403", name: "Forbidden", why: "The client is authenticated but doesn't have permission. Re-authenticating won't help." }
                            },
                            "Resource not found": {
                                q: "Was the resource intentionally removed?",
                                yes: { result: "410", name: "Gone", why: "The resource was intentionally and permanently removed. It's not coming back." },
                                no: { result: "404", name: "Not Found", why: "The resource doesn't exist. The most famous HTTP error." }
                            },
                            "Invalid request data": {
                                q: "Is the syntax valid but semantically wrong?",
                                yes: { result: "422", name: "Unprocessable Entity", why: "The request body is well-formed but has validation errors (e.g. invalid email format)." },
                                no: { result: "400", name: "Bad Request", why: "The request is malformed — bad JSON, missing required fields, etc." }
                            },
                            "Wrong HTTP method": { result: "405", name: "Method Not Allowed", why: "The endpoint exists but doesn't support this HTTP method. Return an Allow header." },
                            "Rate limiting": { result: "429", name: "Too Many Requests", why: "The client sent too many requests. Include a Retry-After header." },
                            "Conflict with current state": { result: "409", name: "Conflict", why: "The request conflicts with the current state — duplicate resource, version mismatch, etc." },
                            "Request too large": { result: "413", name: "Payload Too Large", why: "The request body exceeds the server's size limit." }
                        }
                    },
                    no: {
                        q: "What kind of server error?",
                        options: {
                            "Unexpected error / bug": { result: "500", name: "Internal Server Error", why: "Something went wrong that wasn't expected. The catch-all server error." },
                            "Upstream server gave bad response": { result: "502", name: "Bad Gateway", why: "Your server (acting as proxy) got an invalid response from the upstream server." },
                            "Temporarily overloaded / maintenance": { result: "503", name: "Service Unavailable", why: "The server is temporarily unable to handle requests. Include Retry-After." },
                            "Upstream server timed out": { result: "504", name: "Gateway Timeout", why: "Your server (acting as proxy) didn't get a response from the upstream in time." },
                            "Feature not implemented": { result: "501", name: "Not Implemented", why: "The server doesn't support the functionality needed to fulfill the request." }
                        }
                    }
                }
            }
        };

        var history = [];
        var colors = {'1':'#48cae4','2':'#2dd4a8','3':'#f9c74f','4':'#ff6b6b','5':'#a78bfa'};

        function render(node) {
            var el = document.getElementById('flow');
            el.innerHTML = '';

            // Render history trail
            if (history.length > 0) {
                var trail = document.createElement('div');
                trail.className = 'flow-history';
                history.forEach(function(h, i) {
                    var past = document.createElement('div');
                    past.className = 'flow-past-node';
                    past.innerHTML = '<div class="flow-past-q">' + h.q + '</div>' +
                        '<div class="flow-past-answer">' + h.answer + '</div>';
                    trail.appendChild(past);

                    var conn = document.createElement('div');
                    conn.className = 'flow-connector';
                    trail.appendChild(conn);
                });
                el.appendChild(trail);
            }

            // Render result
            if (node.result) {
                var cat = node.result[0];
                var color = colors[cat] || '#fff';

                var d = document.createElement('div');
                d.className = 'flow-result';
                d.style.borderColor = color.replace(')', ',0.3)').replace('rgb', 'rgba');
                d.style.border = '1px solid ' + color + '33';
                d.innerHTML =
                    '<div class="flow-result-border" style="background:' + color + '"></div>' +
                    '<div class="flow-result-image"><img src="/' + node.result + '.jpg" alt="' + node.result + ' parrot" onerror="this.parentElement.style.display=\'none\'"></div>' +
                    '<div class="flow-result-body">' +
                    '<div class="flow-result-code" style="color:' + color + '">' + node.result + '</div>' +
                    '<div class="flow-result-name">' + node.name + '</div>' +
                    '<div class="flow-result-why">' + node.why + '</div>' +
                    '<div class="flow-actions">' +
                    '<a href="/' + node.result + '" class="btn-back">View parrot</a>' +
                    '<button class="btn-back" onclick="location.reload()">Start over</button>' +
                    '</div>' +
                    '</div>';
                el.appendChild(d);
                el.querySelector('.flow-result').scrollIntoView({ behavior: 'smooth', block: 'center' });
                return;
            }

            // Render current question
            var box = document.createElement('div');
            box.className = 'flow-node';

            var diamond = document.createElement('div');
            diamond.className = 'flow-diamond';
            box.appendChild(diamond);

            var h2 = document.createElement('h2');
            h2.textContent = node.q;
            box.appendChild(h2);

            if (node.options) {
                var opts = document.createElement('div');
                opts.className = 'flow-options';
                Object.keys(node.options).forEach(function(label) {
                    var btn = document.createElement('button');
                    btn.className = 'flow-btn';
                    btn.textContent = label;
                    btn.addEventListener('click', function() {
                        history.push({ q: node.q, answer: label });
                        render(node.options[label]);
                    });
                    opts.appendChild(btn);
                });
                box.appendChild(opts);
            } else {
                var yesno = document.createElement('div');
                yesno.className = 'flow-yesno';

                var yBtn = document.createElement('button');
                yBtn.className = 'flow-btn flow-btn-yes';
                yBtn.textContent = 'Yes';
                yBtn.addEventListener('click', function() {
                    history.push({ q: node.q, answer: 'Yes' });
                    render(node.yes);
                });
                yesno.appendChild(yBtn);

                var nBtn = document.createElement('button');
                nBtn.className = 'flow-btn flow-btn-no';
                nBtn.textContent = 'No';
                nBtn.addEventListener('click', function() {
                    history.push({ q: node.q, answer: 'No' });
                    render(node.no);
                });
                yesno.appendChild(nBtn);

                box.appendChild(yesno);
            }

            el.appendChild(box);

            // Start over link when there's history
            if (history.length > 0) {
                var restart = document.createElement('div');
                restart.className = 'flow-restart';
                restart.innerHTML = '<button onclick="location.reload()">Start over</button>';
                el.appendChild(restart);
            }

            box.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        render(tree);
    })();
    </script>
</body>
</html>
