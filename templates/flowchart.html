{% extends "base.html" %}

{% block title %}Which Status Code? - HTTP Parrots{% endblock %}
{% block subtitle %}Which Status Code?{% endblock %}

{% block content %}
    <main class="flow-container" role="main">
        <div id="flow"></div>
    </main>
{% endblock %}

{% block scripts %}
    <script nonce="{{ csp_nonce }}">
    (function() {
        const tree = {
            q: "Did the request succeed?",
            yes: {
                q: "Did you create a new resource?",
                yes: { result: "201", name: "Created", why: "The request succeeded and a new resource was created. Return a Location header pointing to it." },
                no: {
                    q: "Is there a response body?",
                    yes: {
                        q: "Is the response from the origin server?",
                        yes: { result: "200", name: "OK", why: "The standard success response. Return the requested data." },
                        no: { result: "203", name: "Non-Authoritative Information", why: "The response was modified by a proxy or intermediate. The data may differ from the origin." }
                    },
                    no: {
                        q: "Should the client reset its view (e.g. clear a form)?",
                        yes: { result: "205", name: "Reset Content", why: "Tells the client to reset the document view, like clearing a form after submission." },
                        no: { result: "204", name: "No Content", why: "Success, but nothing to return. Common for DELETE operations or saves." }
                    }
                }
            },
            no: {
                q: "Is the resource somewhere else?",
                yes: {
                    q: "Has it moved permanently?",
                    yes: {
                        q: "Should the HTTP method be preserved?",
                        yes: { result: "308", name: "Permanent Redirect", why: "The resource moved permanently and the client must use the same method (POST stays POST)." },
                        no: { result: "301", name: "Moved Permanently", why: "The resource moved permanently. Browsers may change POST to GET." }
                    },
                    no: {
                        q: "Is this a temporary redirect?",
                        yes: {
                            q: "Should the HTTP method be preserved?",
                            yes: { result: "307", name: "Temporary Redirect", why: "Temporary redirect that preserves the request method." },
                            no: { result: "302", name: "Found", why: "Temporary redirect. Browsers typically change POST to GET." }
                        },
                        no: { result: "303", name: "See Other", why: "Redirect to a different resource using GET. Classic Post/Redirect/Get pattern." }
                    }
                },
                no: {
                    q: "Is the problem with the client's request?",
                    yes: {
                        q: "What kind of client error?",
                        options: {
                            "Missing or bad authentication": {
                                q: "Does the client need to authenticate?",
                                yes: { result: "401", name: "Unauthorized", why: "The client needs to authenticate. Include a WWW-Authenticate header." },
                                no: { result: "403", name: "Forbidden", why: "The client is authenticated but doesn't have permission. Re-authenticating won't help." }
                            },
                            "Resource not found": {
                                q: "Was the resource intentionally removed?",
                                yes: { result: "410", name: "Gone", why: "The resource was intentionally and permanently removed. It's not coming back." },
                                no: { result: "404", name: "Not Found", why: "The resource doesn't exist. The most famous HTTP error." }
                            },
                            "Invalid request data": {
                                q: "Is the syntax valid but semantically wrong?",
                                yes: { result: "422", name: "Unprocessable Entity", why: "The request body is well-formed but has validation errors (e.g. invalid email format)." },
                                no: { result: "400", name: "Bad Request", why: "The request is malformed — bad JSON, missing required fields, etc." }
                            },
                            "Wrong HTTP method": { result: "405", name: "Method Not Allowed", why: "The endpoint exists but doesn't support this HTTP method. Return an Allow header." },
                            "Rate limiting": { result: "429", name: "Too Many Requests", why: "The client sent too many requests. Include a Retry-After header." },
                            "Conflict with current state": { result: "409", name: "Conflict", why: "The request conflicts with the current state — duplicate resource, version mismatch, etc." },
                            "Request too large": { result: "413", name: "Payload Too Large", why: "The request body exceeds the server's size limit." }
                        }
                    },
                    no: {
                        q: "What kind of server error?",
                        options: {
                            "Unexpected error / bug": { result: "500", name: "Internal Server Error", why: "Something went wrong that wasn't expected. The catch-all server error." },
                            "Upstream server gave bad response": { result: "502", name: "Bad Gateway", why: "Your server (acting as proxy) got an invalid response from the upstream server." },
                            "Temporarily overloaded / maintenance": { result: "503", name: "Service Unavailable", why: "The server is temporarily unable to handle requests. Include Retry-After." },
                            "Upstream server timed out": { result: "504", name: "Gateway Timeout", why: "Your server (acting as proxy) didn't get a response from the upstream in time." },
                            "Feature not implemented": { result: "501", name: "Not Implemented", why: "The server doesn't support the functionality needed to fulfill the request." }
                        }
                    }
                }
            }
        };

        const history = [];
        const colors = {'1':'#48cae4','2':'#2dd4a8','3':'#f9c74f','4':'#ff6b6b','5':'#a78bfa'};

        function goBack() {
            if (history.length === 0) return;
            history.pop();
            var node = tree;
            for (var i = 0; i < history.length; i++) {
                var h = history[i];
                if (node.options) {
                    node = node.options[h.answer];
                } else {
                    node = h.answer === 'Yes' ? node.yes : node.no;
                }
            }
            render(node);
        }

        function render(node) {
            const el = document.getElementById('flow');
            el.innerHTML = '';

            if (history.length > 0) {
                const trail = document.createElement('div');
                trail.className = 'flow-history';
                history.forEach(function(h) {
                    const past = document.createElement('div');
                    past.className = 'flow-past-node';
                    const pastQ = document.createElement('div');
                    pastQ.className = 'flow-past-q';
                    pastQ.textContent = h.q;
                    const pastA = document.createElement('div');
                    pastA.className = 'flow-past-answer';
                    pastA.textContent = h.answer;
                    past.appendChild(pastQ);
                    past.appendChild(pastA);
                    trail.appendChild(past);

                    const conn = document.createElement('div');
                    conn.className = 'flow-connector';
                    trail.appendChild(conn);
                });
                el.appendChild(trail);
            }

            if (node.result) {
                const cat = node.result[0];
                const color = colors[cat] || '#fff';

                const d = document.createElement('div');
                d.className = 'flow-result';
                d.style.border = '1px solid ' + color + '33';

                const border = document.createElement('div');
                border.className = 'flow-result-border';
                border.style.background = color;
                d.appendChild(border);

                const imgWrap = document.createElement('div');
                imgWrap.className = 'flow-result-image';
                const img = document.createElement('img');
                img.src = '/' + node.result + '.jpg';
                img.alt = node.result + ' parrot';
                img.width = 600;
                img.height = 500;
                img.onerror = function() { this.parentElement.style.display = 'none'; };
                imgWrap.appendChild(img);
                d.appendChild(imgWrap);

                const body = document.createElement('div');
                body.className = 'flow-result-body';
                const codeEl = document.createElement('div');
                codeEl.className = 'flow-result-code';
                codeEl.style.color = color;
                codeEl.textContent = node.result;
                body.appendChild(codeEl);
                const nameEl = document.createElement('div');
                nameEl.className = 'flow-result-name';
                nameEl.textContent = node.name;
                body.appendChild(nameEl);
                const whyEl = document.createElement('div');
                whyEl.className = 'flow-result-why';
                whyEl.textContent = node.why;
                body.appendChild(whyEl);

                const actions = document.createElement('div');
                actions.className = 'flow-actions';
                if (history.length > 0) {
                    const backBtn = document.createElement('button');
                    backBtn.className = 'flow-action-back';
                    backBtn.textContent = 'Back';
                    backBtn.addEventListener('click', goBack);
                    actions.appendChild(backBtn);
                }
                const viewLink = document.createElement('a');
                viewLink.href = '/' + node.result;
                viewLink.className = 'flow-action-primary';
                viewLink.textContent = 'View parrot';
                actions.appendChild(viewLink);
                const restartBtn = document.createElement('button');
                restartBtn.className = 'flow-action-secondary';
                restartBtn.textContent = 'Start over';
                restartBtn.addEventListener('click', function() { location.reload(); });
                actions.appendChild(restartBtn);
                body.appendChild(actions);
                d.appendChild(body);

                el.appendChild(d);
                d.scrollIntoView({ behavior: 'smooth', block: 'center' });
                return;
            }

            const box = document.createElement('div');
            box.className = 'flow-node';

            const diamond = document.createElement('div');
            diamond.className = 'flow-diamond';
            box.appendChild(diamond);

            const h2 = document.createElement('h2');
            h2.textContent = node.q;
            box.appendChild(h2);

            if (node.options) {
                const opts = document.createElement('div');
                opts.className = 'flow-options';
                Object.keys(node.options).forEach(function(label) {
                    const btn = document.createElement('button');
                    btn.className = 'flow-btn';
                    btn.textContent = label;
                    btn.addEventListener('click', function() {
                        history.push({ q: node.q, answer: label });
                        render(node.options[label]);
                    });
                    opts.appendChild(btn);
                });
                box.appendChild(opts);
            } else {
                const yesno = document.createElement('div');
                yesno.className = 'flow-yesno';

                const yBtn = document.createElement('button');
                yBtn.className = 'flow-btn flow-btn-yes';
                yBtn.textContent = 'Yes';
                yBtn.addEventListener('click', function() {
                    history.push({ q: node.q, answer: 'Yes' });
                    render(node.yes);
                });
                yesno.appendChild(yBtn);

                const nBtn = document.createElement('button');
                nBtn.className = 'flow-btn flow-btn-no';
                nBtn.textContent = 'No';
                nBtn.addEventListener('click', function() {
                    history.push({ q: node.q, answer: 'No' });
                    render(node.no);
                });
                yesno.appendChild(nBtn);

                box.appendChild(yesno);
            }

            el.appendChild(box);

            if (history.length > 0) {
                const restart = document.createElement('div');
                restart.className = 'flow-actions';
                const backBtn = document.createElement('button');
                backBtn.className = 'flow-action-back';
                backBtn.textContent = 'Back';
                backBtn.addEventListener('click', goBack);
                restart.appendChild(backBtn);
                const restartBtn = document.createElement('button');
                restartBtn.className = 'flow-action-secondary';
                restartBtn.textContent = 'Start over';
                restartBtn.addEventListener('click', function() { location.reload(); });
                restart.appendChild(restartBtn);
                el.appendChild(restart);
            }

            box.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        render(tree);
    })();
    </script>
{% endblock %}
