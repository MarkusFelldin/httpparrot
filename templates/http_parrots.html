<!doctype html>
<html lang="en">
<head>
    <title>HTTP Parrots</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon"/>
</head>
<body>
    <header class="site-header-compact">
        <div class="header-inner">
            <div class="header-left">
                <a href="/" class="header-title">HTTP Parrots</a>
                <span class="header-subtitle">Every HTTP status code, explained by parrots</span>
            </div>
            <div class="header-right">
                <a href="/random" class="btn-random" title="Random parrot">🎲</a>
                <input type="text" id="search" class="search-input" placeholder="Search..." autocomplete="off">
            </div>
        </div>
    </header>

    <main class="container-fluid parrot-grid">
        <div class="row g-4" id="parrot-grid">
            {% for status_code in status_code_list %}
                <div class="col-lg-3 col-md-4 col-sm-6 col-12 parrot-card" data-code="{{ status_code[0] }}" data-name="{{ status_code[1]|lower }}">
                    <a href="/{{ status_code[0] }}" class="parrot-link">
                        <div class="parrot">
                            <div class="img">
                                <img src="/static/{{ status_code[2] }}" alt="{{ status_code[0] }} {{ status_code[1] }}" loading="lazy"/>
                            </div>
                            <div class="img-text">
                                <div class="img-status-code category-{{ status_code[0][0] }}xx">{{ status_code[0] }}</div>
                                <div class="img-status-code-text">{{ status_code[1] }}</div>
                            </div>
                        </div>
                    </a>
                </div>
            {% endfor %}
        </div>
        <div id="no-results" style="display:none; text-align:center; padding:3rem; color:rgba(255,255,255,0.4);">
            No parrots found matching your search.
        </div>
    </main>

    <footer class="site-footer">
        HTTP Parrots by Markus Felldin
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
    document.getElementById('search').addEventListener('input', function() {
        const q = this.value.toLowerCase().trim();
        const cards = document.querySelectorAll('.parrot-card');
        let visible = 0;
        cards.forEach(function(card) {
            const code = card.dataset.code;
            const name = card.dataset.name;
            const match = !q || code.includes(q) || name.includes(q);
            card.style.display = match ? '' : 'none';
            if (match) visible++;
        });
        document.getElementById('no-results').style.display = visible ? 'none' : 'block';
    });
    </script>

    <!-- Konami Code Easter Egg -->
    <div id="party-parrot-overlay">
        <div id="party-parrot-container"></div>
        <div id="party-parrot-text">PARTY PARROT MODE</div>
    </div>

    <script>
    (function() {
        const konamiCode = ['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','b','a'];
        let pos = 0;

        document.addEventListener('keydown', function(e) {
            if (e.key === konamiCode[pos]) {
                pos++;
                if (pos === konamiCode.length) {
                    pos = 0;
                    activatePartyParrot();
                }
            } else {
                pos = 0;
            }
        });

        function activatePartyParrot() {
            const overlay = document.getElementById('party-parrot-overlay');
            const container = document.getElementById('party-parrot-container');
            container.innerHTML = '';

            for (let i = 0; i < 20; i++) {
                const parrot = document.createElement('div');
                parrot.className = 'flying-parrot';
                parrot.textContent = '🦜';
                parrot.style.left = Math.random() * 100 + 'vw';
                parrot.style.animationDelay = Math.random() * 2 + 's';
                parrot.style.animationDuration = (2 + Math.random() * 3) + 's';
                parrot.style.fontSize = (2 + Math.random() * 4) + 'rem';
                container.appendChild(parrot);
            }

            overlay.classList.add('active');

            document.body.style.animation = 'rainbow-bg 0.5s infinite';

            setTimeout(function() {
                overlay.classList.remove('active');
                document.body.style.animation = '';
                container.innerHTML = '';
            }, 5000);
        }
    })();
    </script>
</body>
</html>
