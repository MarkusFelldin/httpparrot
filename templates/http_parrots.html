<!doctype html>
<html lang="en">
<head>
    <title>HTTP Parrots - Every HTTP Status Code Explained by Parrots</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="A fun visual guide to HTTP status codes, each illustrated by a parrot. Browse 72 status codes from 100 to 530 with descriptions, history, and hilarious parrot images.">
    <meta property="og:title" content="HTTP Parrots">
    <meta property="og:description" content="Every HTTP status code, explained by parrots. A fun visual reference for developers.">
    <meta property="og:image" content="{{ request.url_root }}static/200.jpg">
    <meta property="og:url" content="{{ request.url }}">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="HTTP Parrots">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preload" href="/static/style.css" as="style">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon"/>
    <link rel="prefetch" href="/quiz">
    <link rel="prefetch" href="/random">
</head>
<body>
    <a href="#parrot-grid" class="skip-link">Skip to content</a>
    <header class="site-header-compact" role="banner">
        <div class="header-inner">
            <div class="header-left">
                <a href="/" class="header-title">HTTP Parrots</a>
                <span class="header-subtitle">Every HTTP status code, explained by parrots</span>
                <nav class="header-nav" aria-label="Site navigation">
                    <a href="/quiz">Quiz</a>
                    <a href="/flowchart">Flowchart</a>
                    <a href="/tester">Tester</a>
                    <a href="/api-docs">API</a>
                </nav>
            </div>
            <div class="header-right">
                <a href="/random" class="btn-random" title="Random parrot" aria-label="Random parrot">🎲</a>
                <div role="search">
                    <input type="text" id="search" class="search-input" placeholder="Search... ( / )" autocomplete="off" aria-label="Search status codes">
                </div>
                <div class="filter-menu">
                    <button class="btn-filter" id="filter-toggle" title="Filter by category" aria-label="Filter by category" aria-expanded="false" aria-controls="filter-dropdown">
                        <span class="filter-icon" aria-hidden="true">&#9776;</span>
                        <span class="filter-dot" aria-hidden="true"></span>
                    </button>
                    <div class="filter-dropdown" id="filter-dropdown" role="menu">
                        <button class="cat-pill active" data-cat="all">All</button>
                        <button class="cat-pill cat-1xx" data-cat="1">1xx Informational</button>
                        <button class="cat-pill cat-2xx" data-cat="2">2xx Success</button>
                        <button class="cat-pill cat-3xx" data-cat="3">3xx Redirection</button>
                        <button class="cat-pill cat-4xx" data-cat="4">4xx Client Error</button>
                        <button class="cat-pill cat-5xx" data-cat="5">5xx Server Error</button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="container-fluid parrot-grid" role="main">
        <div class="row g-4" id="parrot-grid">
            {% for status_code in status_code_list %}
                <div class="col-lg-3 col-md-4 col-sm-6 col-12 parrot-card" data-code="{{ status_code[0] }}" data-name="{{ status_code[1]|lower }}">
                    <a href="/{{ status_code[0] }}" class="parrot-link" aria-label="{{ status_code[0] }} {{ status_code[1] }}">
                        <div class="parrot parrot-{{ status_code[0][0] }}xx{% if status_code[0] == featured %} featured{% endif %}">
                            <div class="img">
                                <img src="/static/{{ status_code[2] }}" alt="{{ status_code[0] }} {{ status_code[1] }}" loading="lazy"/>
                            </div>
                            <div class="img-text">
                                <div class="img-status-code category-{{ status_code[0][0] }}xx">{{ status_code[0] }}</div>
                                <div class="img-status-code-text">{{ status_code[1] }}</div>
                            </div>
                        </div>
                    </a>
                </div>
            {% endfor %}
        </div>
        <div id="no-results" role="status" aria-live="polite" style="display:none; text-align:center; padding:3rem; color:rgba(255,255,255,0.4);">
            No parrots found matching your search.
        </div>
    </main>

    <footer class="site-footer">
        HTTP Parrots by Markus Felldin
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
    (function() {
        let activeCat = 'all';
        const searchEl = document.getElementById('search');
        const cards = document.querySelectorAll('.parrot-card');
        const noResults = document.getElementById('no-results');
        const pills = document.querySelectorAll('.cat-pill');

        function filterCards() {
            const q = searchEl.value.toLowerCase().trim();
            let visible = 0;
            cards.forEach(function(card) {
                const code = card.dataset.code;
                const name = card.dataset.name;
                const catMatch = activeCat === 'all' || code[0] === activeCat;
                const searchMatch = !q || code.includes(q) || name.includes(q);
                const show = catMatch && searchMatch;
                card.style.display = show ? '' : 'none';
                if (show) visible++;
            });
            noResults.style.display = visible ? 'none' : 'block';
        }

        searchEl.addEventListener('input', filterCards);

        pills.forEach(function(pill) {
            pill.addEventListener('click', function() {
                pills.forEach(function(p) { p.classList.remove('active'); });
                pill.classList.add('active');
                activeCat = pill.dataset.cat;
                filterCards();
                dropdown.classList.remove('open');
                toggleBtn.classList.remove('open');
                toggleBtn.className = 'btn-filter';
                if (activeCat !== 'all') {
                    toggleBtn.classList.add('has-filter', 'cat-active-' + activeCat);
                }
            });
        });

        var toggleBtn = document.getElementById('filter-toggle');
        var dropdown = document.getElementById('filter-dropdown');

        toggleBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            var isOpen = dropdown.classList.toggle('open');
            toggleBtn.classList.toggle('open');
            toggleBtn.setAttribute('aria-expanded', isOpen);
        });

        document.addEventListener('click', function(e) {
            if (!dropdown.contains(e.target) && e.target !== toggleBtn) {
                dropdown.classList.remove('open');
                toggleBtn.classList.remove('open');
                toggleBtn.setAttribute('aria-expanded', 'false');
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === '/' && document.activeElement !== searchEl) {
                e.preventDefault();
                searchEl.focus();
            }
            if (e.key === 'Escape' && document.activeElement === searchEl) {
                searchEl.blur();
            }
        });

        document.querySelectorAll('.parrot-link').forEach(function(link) {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                var href = this.href;
                this.closest('.parrot-card').classList.add('clicked');
                setTimeout(function() { window.location.href = href; }, 180);
            });
        });
    })();
    </script>

    <script>
    (function() {
        var observer = new IntersectionObserver(function(entries) {
            entries.forEach(function(entry) {
                if (entry.isIntersecting) {
                    entry.target.classList.add('revealed');
                    observer.unobserve(entry.target);
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.parrot-card').forEach(function(card, i) {
            card.style.transitionDelay = (i % 8) * 0.05 + 's';
            observer.observe(card);
        });
    })();
    </script>

    <!-- Konami Code Easter Egg -->
    <div id="party-parrot-overlay">
        <div id="party-parrot-container"></div>
        <div id="party-parrot-text">PARTY PARROT MODE</div>
    </div>

    <script>
    (function() {
        const konamiCode = ['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','b','a'];
        let pos = 0;

        document.addEventListener('keydown', function(e) {
            if (e.key === konamiCode[pos]) {
                pos++;
                if (pos === konamiCode.length) {
                    pos = 0;
                    activatePartyParrot();
                }
            } else {
                pos = 0;
            }
        });

        function activatePartyParrot() {
            const overlay = document.getElementById('party-parrot-overlay');
            const container = document.getElementById('party-parrot-container');
            container.innerHTML = '';

            for (let i = 0; i < 20; i++) {
                const parrot = document.createElement('div');
                parrot.className = 'flying-parrot';
                parrot.textContent = '🦜';
                parrot.style.left = Math.random() * 100 + 'vw';
                parrot.style.animationDelay = Math.random() * 2 + 's';
                parrot.style.animationDuration = (2 + Math.random() * 3) + 's';
                parrot.style.fontSize = (2 + Math.random() * 4) + 'rem';
                container.appendChild(parrot);
            }

            overlay.classList.add('active');

            document.body.style.animation = 'rainbow-bg 0.5s infinite';

            setTimeout(function() {
                overlay.classList.remove('active');
                document.body.style.animation = '';
                container.innerHTML = '';
            }, 5000);
        }
    })();
    </script>
</body>
</html>
