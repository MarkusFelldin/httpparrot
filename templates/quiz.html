{% extends "base.html" %}

{% block title %}Quiz - HTTP Parrots{% endblock %}
{% block subtitle %}Quiz Mode{% endblock %}

{% block meta %}
    <meta name="description" content="Test your HTTP status code knowledge. Identify status codes from parrot images in this interactive quiz for developers.">
{% endblock %}

{% block content %}
    <main class="quiz-container" id="main-content" role="main">
        <h1 class="sr-only">HTTP Status Code Quiz</h1>
        <div class="quiz-score" role="region" aria-label="Score tracker">
            <div class="score-item score-correct">
                <div class="score-value" id="score" aria-live="polite">0</div>
                <div class="score-label">Correct</div>
            </div>
            <div class="score-item score-streak">
                <div class="score-value" id="streak" aria-live="polite">0</div>
                <div class="score-label">Streak</div>
            </div>
            <div class="score-item score-total">
                <div class="score-value" id="total" aria-live="polite">0</div>
                <div class="score-label">Total</div>
            </div>
        </div>

        <div class="quiz-image">
            <img id="quiz-img" src="" alt="Guess this HTTP status code" width="600" height="500">
        </div>

        <div class="quiz-choices" id="choices" role="group" aria-label="Answer choices"></div>
        <div class="quiz-feedback" id="feedback" aria-live="polite" role="status"></div>
        <div class="quiz-next" id="next-wrap">
            <button class="btn-back" id="next-btn">Next parrot</button>
        </div>
    </main>
{% endblock %}

{% block scripts %}
    <script nonce="{{ csp_nonce }}">
    (function() {
        const allCodes = {{ quiz_data | tojson }};
        let score = 0, streak = 0, total = 0;
        let answered = false;
        let history = [];

        /* Adaptive difficulty: load mistakes from localStorage */
        var MISTAKES_KEY = 'httpparrot_quiz_mistakes';
        function getMistakes() {
            try {
                var raw = localStorage.getItem(MISTAKES_KEY);
                if (raw) return JSON.parse(raw);
            } catch(e) {}
            return [];
        }
        function saveMistakes(arr) {
            try { localStorage.setItem(MISTAKES_KEY, JSON.stringify(arr)); } catch(e) {}
        }
        function addMistake(code) {
            var m = getMistakes();
            if (m.indexOf(code) === -1) m.push(code);
            saveMistakes(m);
        }
        function removeMistake(code) {
            var m = getMistakes();
            var idx = m.indexOf(code);
            if (idx !== -1) m.splice(idx, 1);
            saveMistakes(m);
        }
        function pickWeightedCode() {
            var mistakes = getMistakes();
            var mistakeCodes = allCodes.filter(function(c) { return mistakes.indexOf(c.code) !== -1; });
            if (mistakeCodes.length > 0 && Math.random() < 0.5) {
                return mistakeCodes[Math.floor(Math.random() * mistakeCodes.length)];
            }
            return allCodes[Math.floor(Math.random() * allCodes.length)];
        }

        function spawnConfetti(originEl) {
            var rect = originEl.getBoundingClientRect();
            var cx = rect.left + rect.width / 2;
            var cy = rect.top + rect.height / 2;
            for (var i = 0; i < 20; i++) {
                var p = document.createElement('div');
                p.className = 'confetti-particle';
                p.style.left = cx + 'px';
                p.style.top = cy + 'px';
                var angle = Math.random() * Math.PI * 2;
                var dist = 50 + Math.random() * 100;
                p.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
                p.style.setProperty('--ty', Math.sin(angle) * dist - 30 + 'px');
                p.style.setProperty('--rot', (Math.random() * 720 - 360) + 'deg');
                p.style.backgroundColor = ['#00c9a7','#00b4d8','#7b61ff','#ff6b6b','#ffd93d'][Math.floor(Math.random()*5)];
                document.body.appendChild(p);
                p.addEventListener('animationend', function() { this.remove(); });
            }
        }

        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                const t = arr[i]; arr[i] = arr[j]; arr[j] = t;
            }
            return arr;
        }

        function pickChoices(correct) {
            const others = allCodes.filter(function(c) { return c.code !== correct.code; });
            shuffle(others);
            const choices = [correct].concat(others.slice(0, 3));
            return shuffle(choices);
        }

        function nextRound() {
            answered = false;
            const correct = pickWeightedCode();
            const choices = pickChoices(correct);

            document.getElementById('quiz-img').src = '/static/' + correct.image;
            document.getElementById('feedback').textContent = '';
            document.getElementById('feedback').className = 'quiz-feedback';
            document.getElementById('next-wrap').style.display = 'none';

            const container = document.getElementById('choices');
            while (container.firstChild) container.removeChild(container.firstChild);
            var labels = ['A', 'B', 'C', 'D'];
            choices.forEach(function(c, i) {
                const btn = document.createElement('button');
                btn.className = 'quiz-btn';
                var label = document.createElement('span');
                label.className = 'quiz-btn-label';
                label.textContent = labels[i];
                var text = document.createElement('span');
                text.className = 'quiz-btn-text';
                text.textContent = c.code + ' ' + c.name;
                btn.appendChild(label);
                btn.appendChild(text);
                btn.dataset.code = c.code;
                btn.addEventListener('click', function() {
                    if (answered) return;
                    answered = true;
                    total++;

                    const btns = container.querySelectorAll('.quiz-btn');
                    const fb = document.getElementById('feedback');
                    if (c.code === correct.code) {
                        btns.forEach(function(b) {
                            b.disabled = true;
                            if (b.dataset.code === correct.code) b.classList.add('correct');
                        });
                        score++;
                        streak++;
                        history.push(true);
                        removeMistake(correct.code);
                        spawnConfetti(btn);
                        fb.textContent = 'Correct!';
                        fb.className = 'quiz-feedback right';
                        if (typeof ParrotXP !== 'undefined') ParrotXP.award(10, 'quiz_correct');
                        if (typeof ParrotSound !== 'undefined' && ParrotSound.isEnabled()) ParrotSound.correct();
                    } else {
                        btn.classList.add('wrong');
                        btns.forEach(function(b) {
                            b.disabled = true;
                            if (b.dataset.code === correct.code) b.classList.add('correct', 'reveal-correct');
                        });
                        streak = 0;
                        history.push(false);
                        addMistake(correct.code);
                        fb.textContent = 'Nope! It was ' + correct.code + ' ' + correct.name;
                        fb.className = 'quiz-feedback nope';
                        if (typeof ParrotSound !== 'undefined' && ParrotSound.isEnabled()) ParrotSound.wrong();
                    }

                    document.getElementById('score').textContent = score;
                    document.getElementById('streak').textContent = streak;
                    document.getElementById('total').textContent = total;

                    var streakEl = document.querySelector('.score-streak');
                    streakEl.classList.remove('on-fire', 'blazing');
                    if (streak >= 10) streakEl.classList.add('blazing');
                    else if (streak >= 5) streakEl.classList.add('on-fire');
                    var sv = document.getElementById('streak');
                    sv.classList.remove('streak-bump');
                    void sv.offsetWidth;
                    sv.classList.add('streak-bump');

                    document.getElementById('next-wrap').style.display = '';

                    if (total === 10) {
                        setTimeout(function() { showResults(); }, 800);
                    }
                });
                container.appendChild(btn);
            });
        }

        function showResults() {
            if (score === 10) {
                localStorage.setItem('httpparrot_perfect_quiz', 'true');
                if (typeof ParrotXP !== 'undefined') ParrotXP.checkFeathers();
            }
            var emojis = history.map(function(h) { return h ? '\uD83D\uDFE2' : '\uD83D\uDD34'; }).join('');
            var resultText = 'HTTP Parrots Quiz: ' + score + '/10\n' + emojis + '\nhttpparrots.com/quiz';
            var overlay = document.createElement('div');
            overlay.className = 'quiz-results-overlay';
            var card = document.createElement('div');
            card.className = 'quiz-results-card';
            var title = document.createElement('div');
            title.className = 'quiz-results-title';
            title.textContent = score + '/10 Parrots Identified!';
            card.appendChild(title);
            var grid = document.createElement('div');
            grid.className = 'quiz-results-grid';
            grid.textContent = emojis;
            card.appendChild(grid);
            var copyBtn = document.createElement('button');
            copyBtn.className = 'btn-back quiz-results-copy';
            copyBtn.textContent = 'Copy Result';
            copyBtn.addEventListener('click', function() {
                navigator.clipboard.writeText(resultText).then(function() {
                    copyBtn.textContent = 'Copied!';
                    setTimeout(function() { copyBtn.textContent = 'Copy Result'; }, 2000);
                }).catch(function() {
                    copyBtn.textContent = 'Failed';
                    setTimeout(function() { copyBtn.textContent = 'Copy Result'; }, 2000);
                });
            });
            card.appendChild(copyBtn);
            var again = document.createElement('button');
            again.className = 'btn-back quiz-results-again';
            again.textContent = 'Play Again';
            again.addEventListener('click', function() {
                overlay.remove();
                score = 0; streak = 0; total = 0; history = [];
                document.getElementById('score').textContent = '0';
                document.getElementById('streak').textContent = '0';
                document.getElementById('total').textContent = '0';
                var streakEl = document.querySelector('.score-streak');
                streakEl.classList.remove('on-fire', 'blazing');
                nextRound();
            });
            card.appendChild(again);
            overlay.appendChild(card);
            document.body.appendChild(overlay);
        }

        document.getElementById('next-btn').addEventListener('click', function() {
            if (total < 10) nextRound();
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && answered && total < 10) nextRound();
            if (!answered && e.key >= '1' && e.key <= '4') {
                const btns = document.querySelectorAll('.quiz-btn');
                if (btns[parseInt(e.key) - 1]) btns[parseInt(e.key) - 1].click();
            }
        });

        nextRound();
    })();
    </script>
{% endblock %}
