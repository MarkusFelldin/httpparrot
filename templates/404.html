{% extends "base.html" %}

{% block title %}404 - Parrot Not Found{% endblock %}

{% block content %}
    <main class="container error-container">
        <div class="error-emoji">&#x1F99C;&#x2753;</div>
        <div class="img-status-code category-4xx error-code">404</div>
        <h1 class="error-title">Parrot Not Found</h1>
        <p class="error-message">
            This parrot has flown the coop. The page you're looking for doesn't exist or has migrated to warmer climates.
        </p>
        <div class="error-actions">
            <a href="/" class="btn-back">&larr; Back to all parrots</a>
            <span class="error-separator">|</span>
            <a href="/random" class="btn-back">Random parrot &rarr;</a>
        </div>
    </main>
{% endblock %}
