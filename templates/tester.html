{% extends "base.html" %}

{% block title %}HTTP Tester - HTTP Parrots{% endblock %}
{% block subtitle %}HTTP Tester{% endblock %}

{% block content %}
    <main class="tester-container" role="main">
        <form class="tester-form" id="tester-form">
            <input type="text" class="tester-input" id="url-input" placeholder="Enter a URL (e.g. example.com)" autocomplete="off" aria-label="URL to test">
            <button type="submit" class="tester-submit" id="submit-btn">Test</button>
        </form>
        <div id="result"></div>
    </main>
{% endblock %}

{% block scripts %}
    <script nonce="{{ csp_nonce }}">
    (function() {
        const codes = {
            200:'OK',201:'Created',202:'Accepted',204:'No Content',
            301:'Moved Permanently',302:'Found',303:'See Other',304:'Not Modified',307:'Temporary Redirect',308:'Permanent Redirect',
            400:'Bad Request',401:'Unauthorized',403:'Forbidden',404:'Not Found',405:'Method Not Allowed',
            408:'Request Time-out',410:'Gone',429:'Too Many Requests',451:'Unavailable For Legal Reasons',
            500:'Internal Server Error',502:'Bad Gateway',503:'Service Unavailable',504:'Gateway Time-out'
        };
        const colors = {'1':'#48cae4','2':'#2dd4a8','3':'#f9c74f','4':'#ff6b6b','5':'#a78bfa'};

        function el(tag, cls, text) {
            const e = document.createElement(tag);
            if (cls) e.className = cls;
            if (text) e.textContent = text;
            return e;
        }

        function showError(container, msg) {
            container.innerHTML = '';
            container.appendChild(el('div', 'tester-error', msg));
        }

        document.getElementById('tester-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const url = document.getElementById('url-input').value.trim();
            if (!url) return;

            const result = document.getElementById('result');
            const btn = document.getElementById('submit-btn');
            result.innerHTML = '';
            result.appendChild(el('div', 'tester-loading', 'Testing...'));
            btn.disabled = true;

            fetch('/api/check-url?url=' + encodeURIComponent(url))
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    btn.disabled = false;
                    if (data.error) {
                        showError(result, data.error);
                        return;
                    }
                    const code = data.code;
                    const name = codes[code] || 'Unknown';
                    const cat = String(code)[0];
                    const color = colors[cat] || '#fff';

                    result.innerHTML = '';
                    const card = el('div', 'tester-result');
                    const header = el('div', 'tester-result-header');
                    const codeEl = el('div', 'tester-result-code', String(code));
                    codeEl.style.color = color;
                    header.appendChild(codeEl);
                    header.appendChild(el('div', 'tester-result-name', name));
                    header.appendChild(el('div', 'tester-result-url', data.url));
                    card.appendChild(header);

                    const img = document.createElement('img');
                    img.src = '/' + code + '.jpg';
                    img.alt = code + ' parrot';
                    img.width = 600;
                    img.height = 500;
                    img.onerror = function() { this.style.display = 'none'; };
                    card.appendChild(img);

                    const actions = el('div', 'tester-result-actions');
                    const link = document.createElement('a');
                    link.href = '/' + code;
                    link.className = 'btn-back tester-learn-link';
                    link.textContent = 'Learn about ' + code;
                    actions.appendChild(link);
                    card.appendChild(actions);
                    result.appendChild(card);
                })
                .catch(function() {
                    btn.disabled = false;
                    showError(result, 'Could not connect to the provided URL');
                });
        });

        document.getElementById('url-input').focus();
    })();
    </script>
{% endblock %}
